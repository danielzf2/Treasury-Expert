<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Simulador de Títulos Públicos Federais e Derivativos — LTN, NTN-F, NTN-B, LFT, DI1, DAP, DOL, DDI, FRC">
    <meta name="theme-color" content="#0d1117">
    <meta name="color-scheme" content="dark">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <title>Treasury Expert — Simulador TPF + Derivativos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
</head>
<body>
    <header>
        <div class="header-inner">
            <span class="header-logo">Treasury Expert</span>
            <nav class="header-nav" id="mainNav">
                <button class="active" onclick="switchTab('sim')">Simulador</button>
                <button onclick="switchTab('mkt')">Mercado</button>
                <button onclick="switchTab('formulas')">Fórmulas</button>
                <button onclick="switchTab('guia')">Guia</button>
            </nav>
            <button class="header-hamburger" id="hamburgerBtn" onclick="toggleMobileNav()">&#9776;</button>
        </div>
    </header>

    <div class="container">
        <div class="config-row">
            <div>
                <label>Data Negociação</label>
                <input type="date" id="dataNeg">
            </div>
            <div>
                <label>Spot USD</label>
                <input type="number" id="spotInput" value="4.9724" step="0.0001" min="0">
            </div>
            <button class="btn-primary" id="btnFetchMarket" onclick="fetchMarketData()">Atualizar</button>
            <div class="mkt-inline" id="mktIndicators"></div>
        </div>

        <!-- Tab: Simulador -->
        <div id="tab-sim" role="tabpanel">
            <div class="sub-tabs" role="tablist" id="simSubTabs">
                <button class="active" role="tab" aria-selected="true" onclick="switchSimSubTab('pernas')">Pernas &amp; Resumo</button>
                <button role="tab" aria-selected="false" onclick="switchSimSubTab('cenarios')">Cenários &amp; P&amp;L</button>
                <button role="tab" aria-selected="false" onclick="switchSimSubTab('detalhes')">Detalhes &amp; Hedge</button>
            </div>

            <!-- Scenario bar — always visible when results exist -->
            <div class="scenario-bar" id="scenarioBar" style="display:none">
                <div class="scenario-radio" id="scenarioRadio"></div>
                <div id="scenarioDesc" class="muted" style="font-size:11px; margin-bottom:6px"></div>
                <div class="scenario-bar-body">
                    <div class="sliders-panel" id="slidersPanel"></div>
                    <div id="pnlTotal"></div>
                </div>
            </div>

            <!-- Sub-aba: Pernas & Resumo -->
            <div id="subtab-pernas" role="tabpanel">
                <div class="presets" id="presets"></div>
                <div class="sec-h">Pernas da Operação</div>
                <div id="legsHeader" class="leg-row is-header" style="margin-bottom:4px"></div>
                <div id="legsContainer" class="legs-container"></div>
                <button class="btn-add" onclick="addLeg()">+ Adicionar Perna</button>
                <hr class="divider">
                <div id="metricsArea"></div>
                <div class="sec-h">Ativo vs Passivo</div>
                <div id="avTable"></div>
                <div id="riskFactors"></div>
            </div>

            <!-- Sub-aba: Cenários & P&L -->
            <div id="subtab-cenarios" role="tabpanel" style="display:none">
                <div class="charts-grid" id="chartsGrid"></div>
                <div id="decompositionPanel" class="decomposition-panel"></div>
                <div id="pnlBarsChart"></div>
                <div id="mtmTable"></div>
                <div class="two-col">
                    <div id="pnlConsolidatedChart"></div>
                    <div>
                        <div id="pnlPerLegToggle" style="margin-bottom:8px"></div>
                        <div id="pnlPerLegChart"></div>
                    </div>
                </div>
            </div>

            <!-- Sub-aba: Detalhes & Hedge -->
            <div id="subtab-detalhes" role="tabpanel" style="display:none">
                <div class="sec-h">Detalhes das Pernas</div>
                <div id="detailsTable" class="details-wrap"></div>
                <div id="spreadCosts"></div>
                <div id="krdSection"></div>
                <div id="hedgeSection"></div>
            </div>
        </div>

        <!-- Tab: Dados de Mercado -->
        <div id="tab-mkt" role="tabpanel" style="display:none">
            <div id="mktDataContent">
                <p class="muted">Clique em "Atualizar Dados de Mercado" para carregar.</p>
            </div>
        </div>

        <!-- Tab: Fórmulas -->
        <div id="tab-formulas" role="tabpanel" style="display:none">
            <div id="formulasContent"></div>
        </div>

        <!-- Tab: Guia de Instrumentos -->
        <div id="tab-guia" role="tabpanel" style="display:none">
            <div id="guiaContent"></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
